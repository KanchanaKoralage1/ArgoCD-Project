apiVersion: apps/v1
kind : Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: kanchana20/argocd-backend:v1
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: MONGO_URI
              value: "mongodb://localhost:27017/argocd-login"
            - name: JWT_SECRET
              value: "supersecretkey123"