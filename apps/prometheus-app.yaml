apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: prometheus
    targetRevision: 29.2.0
    helm:
      valuesObject:
        server:
          service:
            type: NodePort
            nodePort: 30090
        alertmanager:
          enabled: false
        prometheus-pushgateway:
          enabled: false
        extraScrapeConfigs: |
          - job_name: 'backend'
            static_configs:
              - targets: ['backend-service.default.svc.cluster.local:5000']
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true