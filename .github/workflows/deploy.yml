name: CI - Build and Deploy

on:
  push:
    branches:
      - main
permissions:
  contents: write
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: kanchana20/argocd-backend:${{ steps.tag.outputs.TAG }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: kanchana20/argocd-frontend:${{ steps.tag.outputs.TAG }}

      - name: Update image tags in k8s YAML files
        run: |
          TAG=${{ steps.tag.outputs.TAG }}
          sed -i "s|kanchana20/argocd-backend:.*|kanchana20/argocd-backend:$TAG|g" k8s/backend-deployment.yaml
          sed -i "s|kanchana20/argocd-frontend:.*|kanchana20/argocd-frontend:$TAG|g" k8s/frontend-deployment.yaml
      
      - name: Commit and push updated k8s files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/backend-deployment.yaml k8s/frontend-deployment.yaml
          git commit -m "ci: update image tags to ${{ steps.tag.outputs.TAG }}"
          git push

          